apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ssuai-alerts
  namespace: monitoring
  labels:
    release: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  groups:
    - name: ssuai
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{job="ssuai-backend",status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{job="ssuai-backend"}[5m])) > 0.05
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "ssuAI 5xx rate > 5%"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_server_requests_seconds_bucket{job="ssuai-backend"}[5m])) by (le)
            ) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ssuAI p99 latency > 3s"

        - alert: CircuitBreakerOpen
          expr: resilience4j_circuitbreaker_state{state="open"} == 1
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Circuit Breaker OPEN 상태 감지"
            description: "인스턴스 {{`{{ $labels.instance }}`}}의 서킷 브레이커 {{`{{ $labels.name }}`}}가 OPEN 되었습니다. 외부 API 연동이 일시 차단되고 폴백 로직으로 동작합니다."

        - alert: IntentBusPublishFailures
          expr: sum(rate(library_intent_bus_event_total{result!="sent"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "예약 상태 알림 이벤트 발행 실패"
            description: "library.reservation intent-status 이벤트가 Kafka로 발행되지 못하고 있습니다(result!=sent). 예약 성공/실패 실시간 알림이 사용자에게 누락될 수 있습니다. 발행은 fail-open(예약 자체는 outbox로 진행)이나 알림 지연/누락은 사용자 체감 영향."

        - alert: McpToolCallEventDrops
          expr: sum(rate(mcp_toolcall_event_total{result!="sent"}[10m])) > 0
          for: 10m
          labels:
            severity: info
          annotations:
            summary: "MCP 툴콜 감사 이벤트 드롭"
            description: "mcp.toolcall 감사 이벤트가 드롭되고 있습니다(result!=sent — 큐 포화/전송 실패). 논블로킹 fail-open이라 요청 처리 자체엔 영향 없음, 감사로그 관측성만 저하."

        - alert: IntentSseConsumerLag
          expr: max(kafka_consumer_fetch_manager_records_lag{spring_id=~"intentBusConsumerFactory.*"}) > 50
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "intent-SSE 컨슈머 지연(lag>50)"
            description: "예약 상태 SSE fan-out 컨슈머가 뒤처지고 있습니다. 예약 알림이 지연될 수 있습니다. 포드별 유일 consumer group(broadcast) + auto.offset.reset=latest라 정상시 lag은 ~0이어야 함."

        - alert: PyxisReadBudgetSaturated
          expr: resilience4j_ratelimiter_available_permissions{name="pyxis-read-rl"} == 0
          for: 2m
          labels:
            severity: info
          annotations:
            summary: "Pyxis read 레이트리밋 예산 포화(2분 지속)"
            description: "pyxis-read 레이트리미터의 가용 permit이 2분 연속 0입니다. 좌석조회 수요가 read 예산(ADR 0097로 20/s 상향)을 지속 포화 → 간헐 스로틀 재발 신호. 인스턴스 {{`{{ $labels.instance }}`}}."
